
<style>
html {
	font-family: sans-serif;
}
table {
	border-collapse: collapse;
}
#container > tbody > tr > td {
	border: 1px solid grey;
	padding: 10px;
	vertical-align: top;
}
label {
	font-size: small;
}
#output {
	text-align: center;
	font-size: large;
	font-weight: bold;
}
#graph {
	table-layout: fixed;
	width: 150px;
}
#graph tr {
	height: 10px;
}
#graph td:first-child {
	padding-right: 5px;
	text-align: right;
	font-size: x-small;
}
#graph td:last-child {
	width: 100px;
	border-left: 2px solid black;
	border-right: 2px solid black;
	border-top: 1px solid grey;
	border-bottom: 1px solid grey;
	padding: 0px;
}
#graph tr:first-child td:last-child {
	border: none;
}
#graph tr:nth-child(5n + 1) td:last-child {
	border-bottom: 2px solid black;
}
</style>
<script>
/*array_neighbourhoods is neighbourhood data
pb is value for Google Maps query string, 0 1 2 are price ranges for room types*/
var array_neighbourhoods = [
	{pb: "!1m18!1m12!1m3!1d387193.05050448247!2d-74.30915380756711!3d40.69719336788428!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778686015399!5m2!1sen!2suk", 0: "75-250", 1: "40-120", 2: "28-88"},
	{pb: "!1m18!1m12!1m3!1d96573.32289222191!2d-73.92333509838782!3d40.851760534528516!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c28b553a697cb1%3A0x556e43a78ff15c77!2sBronx%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778694754966!5m2!1sen!2suk", 0: "80-140", 1: "40-70", 2: "28-55.5"},
	{pb: "!1m18!1m12!1m3!1d193747.03188320325!2d-74.1096450337706!3d40.64537482043886!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24416947c2109%3A0x82765c7404007886!2sBrooklyn%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778694801278!5m2!1sen!2suk", 0: "104-198.2", 1: "50-80", 2: "30-50"},
	{pb: "!1m18!1m12!1m3!1d96708.16459652623!2d-74.05163210308703!3d40.759162229810265!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2588f046ee661%3A0xa0b3281fcecc08c!2sManhattan%2C%20New%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778694829860!5m2!1sen!2suk", 0: "140-250", 1: "67-120", 2: "49-88"},
	{pb: "!1m18!1m12!1m3!1d193731.0007397951!2d-74.03594993262081!3d40.65089684542537!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24369470a592b%3A0x4109d18b6c5c7b05!2sQueens%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778694859541!5m2!1sen!2suk", 0: "90-165", 1: "47-75", 2: "30-50.5"},
	{pb: "!1m18!1m12!1m3!1d96990.50818451475!2d-74.2292196129242!3d40.56470673979025!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c245ef79f4d4e7%3A0x50271f8534babc78!2sStaten%20Island%2C%20NY%2C%20USA!5e0!3m2!1sen!2suk!4v1778694883857!5m2!1sen!2suk", 0: "75-150", 1: "40-75", 2: "29-75"},
]

document.addEventListener("DOMContentLoaded", function() {

		/*update price range in output paragraph and graph*/
		function function_display_price_range() {
		var string_range = array_neighbourhoods[neighbourhood.value][document.querySelector("input[name='room_type']:checked").value];

		output.innerHTML = string_range;

		/*reset the graph*/
		array_graph_tds.forEach((e) => {
			e.style.backgroundColor = "";
			e.style.verticalAlign = "";
			e.innerHTML = "";
		});

		/*find which cells to colour and colour them*/
		var array_range = string_range.split("-");
		var first_row = 41 - Math.floor(array_range[1] / 10);
		var last_row = 40 - Math.ceil(array_range[0] / 10);
		for (var i = first_row; i <= last_row; i++) {
			array_graph_tds[i].style.backgroundColor = "lightgrey";
		}

		/*if there's a remainder at top add it*/
		var top_remainder = array_range[1] - Math.floor(array_range[1] / 10) * 10;
		if (top_remainder > 0) {
			array_graph_tds[first_row - 1].style.verticalAlign = "bottom";
			array_graph_tds[first_row - 1].innerHTML = `<div style='height: ${top_remainder}px; background-color: lightgrey;'></div>`;
		}

		/*if there's a remainder at bottom add it*/
		var bottom_remainder = Math.ceil(array_range[0] / 10) * 10 - array_range[0];
		if (bottom_remainder > 0) {
			array_graph_tds[last_row + 1].style.verticalAlign = "top";
			array_graph_tds[last_row + 1].innerHTML = `<div style='height: ${bottom_remainder}px; background-color: lightgrey;'></div>`;
		}
	}

	/*if neighbourhood is chosen, display map, reset room type and display price range*/
	neighbourhood.addEventListener("change", function(e) {
		map.src = "https://www.google.com/maps/embed?pb=" + array_neighbourhoods[e.target.value].pb;
		entire.checked = true;
		function_display_price_range();
	});

	/*array_radios is room type radio buttons*/
	var array_radios = document.querySelectorAll("input[name='room_type']");

	/*if room type is chosen display price range*/
	array_radios.forEach((e) => e.addEventListener("click", function_display_price_range));

	/*create select menu for specific room price*/
	for (var i = 400; i >= 10; i-= 10) {
		price.innerHTML += `<option value='${i}'>${i}</option>`;
	}

	/*if specific room price is chosen add line on graph*/
	price.addEventListener("change", function(e) {
		array_graph_tds.forEach((e) => e.style.borderBottom = "");
		if (e.target.value != "") {
			array_graph_tds[40 - e.target.value/10].style.borderBottom = "4px solid red";
		}
	});

	/*create graph table*/
	var tbody = graph.querySelector("tbody");
	for (var i = 400; i > 0; i -= 50) {
		tbody.innerHTML += `
			<tr><td rowspan='2'>${i}</td><td></td></tr>
			<tr><td></td></tr>
			<tr><td></td><td></td></tr>
			<tr><td></td><td></td></tr>
			<tr><td></td><td></td></tr>
		`;
	}
	tbody.innerHTML += "<tr><td></td><td></td></tr>";

	/*array_graph_tds is graph cells*/
	var array_graph_tds = graph.querySelectorAll("td:last-child");

	/*when document loads, fire "change" event for neighbourhood select*/
	neighbourhood.dispatchEvent(new Event("change"));
});
</script>
<h3>Airbnb New York Price Checker</h3>
<table id='container'>
	<tr>
		<td rowspan='2'>
			<p>
				neighbourhood: 
				<select id='neighbourhood'>
					<option value='0'></option>
					<option value='1'>Bronx</option>
					<option value='2'>Brooklyn</option>
					<option value='3'>Manhattan</option>
					<option value='4'>Queens</option>
					<option value='5'>Staten Island</option>
				</select>
			</p>
			<p>
				<iframe id='map' width='600' height='450' style='border:0;' allowfullscreen='' loading='lazy' referrerpolicy='no-referrer-when-downgrade'></iframe>
			</p>
		</td>
		<td>
			<p>room type:</p>
			<p>
    			<input type='radio' id='entire' name='room_type' value='0' checked>
    			<label for='entire'>Entire home/apt</label>
    		</p>
			<p>
    			<input type='radio' id='private' name='room_type' value='1'>
    			<label for='private'>Private room</label>
    		</p>
			<p>
    			<input type='radio' id='shared' name='room_type' value='2'>
    			<label for='shared'>Shared room</label>
    		</p>
		</td>
		<td rowspan='2'>
			<p>
				your room price: 
				<select id='price'>
					<option></option>
				</select>
			</p>
			<table id='graph'>
				<tbody>
				</tbody>
			</table>
		</td>
	</tr>
	<tr>
		<td>
			<p>expected price range:</p>
			<p id='output'></p>
		</td>
	</tr>
</table>
